events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # Block internal routes
        location /internal/ {
            return 403;
        }

        # ── Auth Service ──────────────────────────────────────
        location /auth/ {
            proxy_pass http://auth:8105/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Jobs Service ──────────────────────────────────────
        location /jobs/ {
            proxy_pass http://jobs:8101/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── AI Scoring Service ────────────────────────────────
        location /scoring/ {
            proxy_pass http://ai-scoring:8102/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Client Intelligence Service ───────────────────────
        location /clients/ {
            proxy_pass http://client-intel:8103/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Letter Generation Service ─────────────────────────
        location /letters/ {
            proxy_pass http://letter-gen:8104/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Analytics Service ─────────────────────────────────
        location /analytics/ {
            proxy_pass http://analytics:8106/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend (default) ────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
