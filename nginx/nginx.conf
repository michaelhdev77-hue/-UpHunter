events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
    client_max_body_size 10m;

    server {
        listen 80;

        # Block internal routes
        location /internal/ {
            return 403;
        }

        # ── API routes (used by frontend) ─────────────────────

        # Auth Service
        location /api/auth/ {
            set $upstream_auth http://auth:8105;
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Team Profile (served by Auth Service)
        location /api/team/profile {
            set $upstream_auth http://auth:8105;
            rewrite ^/api/team/profile(.*) /team-profile$1 break;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Jobs Service
        location /api/jobs/ {
            set $upstream_jobs http://jobs:8101;
            rewrite ^/api/jobs/(.*) /$1 break;
            proxy_pass $upstream_jobs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Scoring Service
        location /api/scoring/ {
            set $upstream_scoring http://ai-scoring:8102;
            rewrite ^/api/scoring/(.*) /$1 break;
            proxy_pass $upstream_scoring;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Client Intelligence Service
        location /api/clients/ {
            set $upstream_clients http://client-intel:8103;
            rewrite ^/api/clients/(.*) /$1 break;
            proxy_pass $upstream_clients;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Cover Letters (served by Letter Gen Service)
        location /api/cover-letters/ {
            set $upstream_letters http://letter-gen:8104;
            rewrite ^/api/cover-letters/(.*) /$1 break;
            proxy_pass $upstream_letters;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Letter Generation Service
        location /api/letters/ {
            set $upstream_letters http://letter-gen:8104;
            rewrite ^/api/letters/(.*) /$1 break;
            proxy_pass $upstream_letters;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Analytics Service
        location /api/analytics/ {
            set $upstream_analytics http://analytics:8106;
            rewrite ^/api/analytics/(.*) /$1 break;
            proxy_pass $upstream_analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Direct service routes (for inter-service / debug) ──

        location /auth/ {
            set $upstream_auth http://auth:8105;
            rewrite ^/auth/(.*) /$1 break;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /jobs/ {
            set $upstream_jobs http://jobs:8101;
            rewrite ^/jobs/(.*) /$1 break;
            proxy_pass $upstream_jobs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /scoring/ {
            set $upstream_scoring http://ai-scoring:8102;
            rewrite ^/scoring/(.*) /$1 break;
            proxy_pass $upstream_scoring;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /clients/ {
            set $upstream_clients http://client-intel:8103;
            rewrite ^/clients/(.*) /$1 break;
            proxy_pass $upstream_clients;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /letters/ {
            set $upstream_letters http://letter-gen:8104;
            rewrite ^/letters/(.*) /$1 break;
            proxy_pass $upstream_letters;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /analytics/ {
            set $upstream_analytics http://analytics:8106;
            rewrite ^/analytics/(.*) /$1 break;
            proxy_pass $upstream_analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend (default) ────────────────────────────────
        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
