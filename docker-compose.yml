# docker-compose.yml

services:
  # ══════════════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════════════════

  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uphunter}
      POSTGRES_USER: ${POSTGRES_USER:-uphunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uphunter}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uphunter}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      jobs:
        condition: service_healthy
      ai-scoring:
        condition: service_healthy
      client-intel:
        condition: service_healthy
      letter-gen:
        condition: service_healthy
      analytics:
        condition: service_healthy
      frontend:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.55
    restart: unless-stopped
    ports:
      - "16687:16686"  # UI
      - "4319:4317"    # OTLP gRPC
      - "4320:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-uphunter}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-uphunter123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ══════════════════════════════════════════════════════════════════════
  #  BACKEND SERVICES
  # ══════════════════════════════════════════════════════════════════════

  auth:
    build: ./services/auth
    restart: unless-stopped
    ports:
      - "8105:8105"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8105/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uphunter}:${POSTGRES_PASSWORD:-uphunter}@db:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      UPWORK_CLIENT_ID: ${UPWORK_CLIENT_ID:-}
      UPWORK_CLIENT_SECRET: ${UPWORK_CLIENT_SECRET:-}
      UPWORK_REDIRECT_URI: ${UPWORK_REDIRECT_URI:-http://localhost:8000/auth/upwork/callback}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  jobs:
    build: ./services/jobs
    restart: unless-stopped
    ports:
      - "8101:8101"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8101/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uphunter}:${POSTGRES_PASSWORD:-uphunter}@db:5432/jobs_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      UPWORK_API_URL: ${UPWORK_API_URL:-https://www.upwork.com/api/graphql}
      AUTH_SERVICE_URL: http://auth:8105
      CLIENT_INTEL_SERVICE_URL: http://client-intel:8103
      JOBS_POLL_INTERVAL_SECONDS: ${JOBS_POLL_INTERVAL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-scoring:
    build: ./services/ai-scoring
    restart: unless-stopped
    ports:
      - "8102:8102"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8102/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uphunter}:${POSTGRES_PASSWORD:-uphunter}@db:5432/jobs_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMP_SCORING: ${OPENAI_TEMP_SCORING:-0.3}
      CLIENT_INTEL_SERVICE_URL: http://client-intel:8103
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  client-intel:
    build: ./services/client-intel
    restart: unless-stopped
    ports:
      - "8103:8103"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8103/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uphunter}:${POSTGRES_PASSWORD:-uphunter}@db:5432/clients_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      UPWORK_API_URL: ${UPWORK_API_URL:-https://www.upwork.com/api/graphql}
      AUTH_SERVICE_URL: http://auth:8105
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  letter-gen:
    build: ./services/letter-gen
    restart: unless-stopped
    ports:
      - "8104:8104"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8104/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uphunter}:${POSTGRES_PASSWORD:-uphunter}@db:5432/letters_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMP_COVER_LETTER: ${OPENAI_TEMP_COVER_LETTER:-0.7}
      OPENAI_TEMP_TRANSLATION: ${OPENAI_TEMP_TRANSLATION:-0.3}
      JOBS_SERVICE_URL: http://jobs:8101
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics:
    build: ./services/analytics
    restart: unless-stopped
    ports:
      - "8106:8106"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8106/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uphunter}:${POSTGRES_PASSWORD:-uphunter}@db:5432/analytics_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      JOBS_SERVICE_URL: http://jobs:8101
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_SCORE_THRESHOLD: ${TELEGRAM_SCORE_THRESHOLD:-70}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  #  FRONTEND
  # ══════════════════════════════════════════════════════════════════════

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_OPTIONS: "--max-old-space-size=4096"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLL_INTERVAL: "2000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "2000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth
      - jobs
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 2g

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  minio_data:
